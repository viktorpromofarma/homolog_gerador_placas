services:
  gerador_placas_php:
    container_name: gerador_placas_php
    build:
      context: "./.docker"
      dockerfile: Dockerfile
    volumes:
      - ./:/var/www/html/

  gerador_placas_http:
    container_name: gerador_placas_http
    image: nginx:1.29-alpine
    ports:
      - 8181:80 # http
    volumes:
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./:/var/www/html/
    depends_on:
      - gerador_placas_php